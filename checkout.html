<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Shop Item - Start Bootstrap Template</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />

    <!--<style>
        body {
            zoom: 95%;
        }
    </style>-->


</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">Start Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">About</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="index.html">All Products</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex gap-2">

                    <a href="index.html" class="btn btn-outline-dark">
                        <i class="bi-shop me-1"></i>
                        Terug naar winkel
                    </a>

                    <a href="cart.html" class="btn btn-outline-dark">
                        <i class="bi-cart-fill me-1"></i>
                        Winkelwagen
                        <span id="cart-count"
                              class="badge bg-dark text-white ms-1 rounded-pill">
                            0
                        </span>

                    </a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Product section-->
    <main class="flex-grow-1">
        <div class="container my-5">

            <div class="row">

                <!-- LEFT: products -->
                <div class="col-lg-8">

                    <h3 class="mb-4">Jouw bestelling</h3>

                    <div id="order-items"></div>

                </div>

                <!-- RIGHT: fixed summary -->
                <div class="col-lg-4">

                    <div class="border rounded p-3 shadow-sm position-sticky"
                         style="top: 20px;">

                        <h5>Overzicht</h5>

                        <div id="summary"></div>

                        <hr>

                        <div id="total" class="fw-bold mb-3"></div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="isDad">
                            <label class="form-check-label" for="isDad">
                                Aankruisen als je menno heet👨‍🦳 <br> (wordt ik niet dood gespamd)
                            </label>
                        </div>

                        <div id="budget-warning"></div>

                        <button onclick="confirmOrder()"
                                class="btn btn-success w-100 btn-lg">
                            Bestellen
                        </button>
                    </div>

                </div>

            </div>
        </div>


    </main>

        <!-- Footer-->
        <footer class="py-5 bg-dark">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Kalebol.com 2026</p></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/products.js"></script>
        <script src="js/cart.js"></script>
        <script src="js/checkout.js"></script>
</body>
</html>
