<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Shop Item - Start Bootstrap Template</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />

    <!--<style>
        body {
            zoom: 95%;
        }
    </style>-->


</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="index.html">Start Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">About</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="index.html">All Products</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex gap-2">

                    <a href="index.html" class="btn btn-outline-dark">
                        <i class="bi-shop me-1"></i>
                        Terug naar winkel
                    </a>

                    <a href="cart.html" class="btn btn-outline-dark">
                        <i class="bi-cart-fill me-1"></i>
                        Winkelwagen
                        <span id="cart-count"
                              class="badge bg-dark text-white ms-1 rounded-pill">
                            0
                        </span>

                    </a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Product section-->
    <main class="flex-grow-1">

            <h1>🎉 Bestelling geplaatst!</h1>
            <h4 class="text-muted fw-normal">

            </h4>

            <a href="index.html" class="btn btn-dark mt-3">
                Terug naar winkel
            </a>

        </div>


    </main>

        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script>
            const params = new URLSearchParams(window.location.search);
            document.getElementById("order-id").innerText =
                "Order ID: " + params.get("order");
        </script>
        <script src="js/products.js"></script>
        <script src="js/cart.js"></script>
